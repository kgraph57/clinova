"prompt\",\"newsType\":\"$undefined\",\"difficulty\":\"intermediate\",\"tags\":[\"用量計算\",\"腎機能調整\",\"臨床応用\",\"薬剤管理\"],\"publishedAt\":\"2026-02-14\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"high\",\"estimatedReadTime\":6,\"content\":\"$4e\",\"coverImage\":null},{\"slug\":\"patient-education\",\"title\":\"患者説明資料ジェネレーター\",\"description\":\"専門用語を使わず、患者や家族が理解しやすい言葉で病気や治療を説明する資料を作成するプロンプト\",\"category\":\"clinical\",\"contentType\":\"prompt\",\"newsType\":\"$undefined\",\"difficulty\":\"beginner\",\"tags\":[\"患者説明\",\"ヘルスリテラシー\",\"患者教育\",\"わかりやすい説明\",\"家族説明\"],\"publishedAt\":\"2026-02-14\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":true,\"riskLevel\":\"$undefined\",\"estimatedReadTime\":8,\"content\":\"$4f\",\"coverImage\":null},{\"slug\":\"res-stats-python\",\"title\":\"統計解析コード生成（Python）\",\"description\":\"pandas, scipy, statsmodelsを使用した統計解析用のPythonコードを生成します。\",\"category\":\"research\",\"contentType\":\"prompt\",\"newsType\":\"$undefined\",\"difficulty\":\"intermediate\",\"tags\":[\"データ分析\",\"研究支援\"],\"publishedAt\":\"2026-02-14\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"$undefined\",\"estimatedReadTime\":4,\"content\":\"$50\",\"coverImage\":null},{\"slug\":\"res-stats-r\",\"title\":\"統計解析コード生成（R）\",\"description\":\"tidyverse, tableone, survivalなどを使用した統計解析用のRコードを生成します。\",\"category\":\"research\",\"contentType\":\"prompt\",\"newsType\":\"$undefined\",\"difficulty\":\"intermediate\",\"tags\":[\"データ分析\",\"研究支援\"],\"publishedAt\":\"2026-02-14\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"$undefined\",\"estimatedReadTime\":5,\"content\":\"$51\",\"coverImage\":null},{\"slug\":\"sdm-cancer-screening\",\"title\":\"がん検診の意思決定支援\",\"description\":\"がん検診のメリットとデメリットを患者の状況に応じて説明し、意思決定を支援します。\",\"category\":\"clinical\",\"contentType\":\"prompt\",\"newsType\":\"$undefined\",\"difficulty\":\"intermediate\",\"tags\":[\"SDM\",\"がん診療\",\"患者対応\",\"意思決定支援\",\"臨床応用\"],\"publishedAt\":\"2026-02-14\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"medium\",\"estimatedReadTime\":3,\"content\":\"\\n# がん検診の意思決定支援\\n\\n## 概要\\n\\nがん検診のメリットとデメリットを患者の状況に応じて説明し、意思決定を支援します。\\n\\n## プロンプトテンプレート\\n\\n```text\\n以下のがん検診について、患者が意思決定をするための情報を、バランスの取れた形で提供してください。\\n\\n# 検診の種類\\n[screening_type]\\n\\n# 患者情報\\n- 年齢・性別：[patient_demographics]\\n- 家族歴：[family_history]\\n- リスク因子：[risk_factors]\\n- 懸念事項：[concerns]\\n\\n# 出力要件\\n1. **検診の目的と方法**（分かりやすい言葉で）\\n2. **メリット（検診を受ける利点）**\\n   - 早期発見の可能性\\n   - 死亡率の減少（エビデンスがあれば明記）\\n3. **デメリット（検診のリスクや負担）**\\n   - 偽陽性（がんではないのに陽性と出る）の可能性\\n   - 過剰診断（放置しても害のないがんを発見してしまう）の可能性\\n   - 検診自体の身体的・精神的負担\\n   - 費用や時間\\n4. **この患者にとっての推奨事項**\\n   - 年齢、家族歴、リスク因子を考慮した場合の推奨\\n   - ガイドラインに基づく推奨\\n5. **意思決定のための質問**\\n   - 患者が考えるべきポイント\\n\\n# 重要な原則\\n- 検診を「受けるべき」と押し付けず、メリットとデメリットを公平に提示する\\n- 不確実性や意見が分かれている点があれば、正直に伝える\\n- 患者が自分の価値観に基づいて選択できるよう支援する\\n```\\n\\n## 活用のポイント\\n\\n- 入力情報はできるだけ詳細に記載すると、より精度の高い出力が得られます。\\n- AIの出力を鵜呑みにせず、必ず専門的知見と照らし合わせて検証してください。\\n- 必要に応じて出力結果をもとに追加の対話を行い、内容を洗練させてください。\\n\",\"coverImage\":null},{\"slug\":\"sdm-end-of-life\",\"title\":\"終末期ケアの意思決定支援\",\"description\":\"終末期の患者と家族が、価値観に基づいたケアの選択をできるよう支援します。\",\"category\":\"clinical\",\"contentType\":\"prompt\",\"newsType\":\"$undefined\",\"difficulty\":\"intermediate\",\"tags\":[\"SDM\",\"患者対応\",\"意思決定支援\",\"緩和ケア\",\"臨床応用\"],\"publishedAt\":\"2026-02-14\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"high\",\"estimatedReadTime\":3,\"content\":\"\\n# 終末期ケアの意思決定支援\\n\\n## 概要\\n\\n終末期の患者と家族が、価値観に基づいたケアの選択をできるよう支援します。\\n\\n## 安全に関する重要な注意事項\\n\\n終末期ケアは非常にデリケートなテーマです。AIの出力は参考情報であり、実際の対話では患者と家族の感情、文化的背景、価値観を最大限尊重してください。\\n\\n## プロンプトテンプレート\\n\\n```text\\n終末期の患者と家族が、今後のケアについて考え、選択するための情報を、共感的で分かりやすい言葉で提供してください。\\n\\n# 患者情報\\n- 診断名と病状：[diagnosis_and_condition]\\n- 予後：[prognosis]\\n- 患者の価値観・希望：[patient_values]\\n- 家族の状況：[family_situation]\\n\\n# 出力要件\\n1. **現在の状況と今後の見通し**（優しく、正直に）\\n2. **利用可能なケアの選択肢**\\n   - 積極的治療（化学療法、放射線療法など）\\n   - 緙和ケア（症状緩和を中心としたケア）\\n   - ホスピス・在宅緩和ケア\\n3. **各選択肢の比較**\\n   - 期待される効果（症状緩和、生存期間への影響）\\n   - 身体的・精神的負担\\n   - 生活の質（QOL）への影響\\n   - 家族への影響\\n4. **患者の価値観と各選択肢の適合性**\\n5. **家族へのサポート**\\n   - 利用可能なサポートシステム\\n6. **話し合いのためのガイド**\\n   - 患者と家族が話し合うべきテーマ\\n\\n# 重要な原則\\n- 共感的で、尊重の気持ちを持って接する\\n- 「正しい選択」はなく、患者と家族の価値観に基づく選択を支援する\\n- 希望を持ち続けることと、現実的な見通しを伝えることのバランスを取る\\n- 文化的・宗教的背景を尊重する\\n```\\n\\n## 活用のポイント\\n\\n- 入力情報はできるだけ詳細に記載すると、より精度の高い出力が得られます。\\n- AIの出力を鵜呑みにせず、必ず専門的知見と照らし合わせて検証してください。\\n- 必要に応じて出力結果をもとに追加の対話を行い、内容を洗練させてください。\\n\",\"coverImage\":null},{\"slug\":\"sdm-treatment-options\",\"title\":\"治療選択肢の共有意思決定（SDM）\",\"description\":\"患者の価値観と生活状況を考慮した治療選択肢の比較・説明を支援するShared Decision Makingプロンプト\",\"category\":\"clinical\",\"contentType\":\"prompt\",\"newsType\":\"$undefined\",\"difficulty\":\"advanced\",\"tags\":[\"SDM\",\"共有意思決定\",\"治療選択\",\"患者中心\",\"インフォームドコンセント\"],\"publishedAt\":\"2026-02-14\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":true,\"riskLevel\":\"medium\",\"estimatedReadTime\":8,\"content\":\"$52\",\"coverImage\":null},{\"slug\":\"treatment-planning\",\"title\":\"エビデンスに基づく治療計画\",\"description\":\"最新のガイドラインに基づいた治療計画のオプションを提示します。\",\"category\":\"clinical\",\"contentType\":\"prompt\",\"newsType\":\"$undefined\",\"difficulty\":\"intermediate\",\"tags\":[\"治療方針\",\"臨床応用\"],\"publishedAt\":\"2026-02-14\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"high\",\"estimatedReadTime\":6,\"content\":\"$53\",\"coverImage\":null},{\"slug\":\"abductive-reasoning\",\"title\":\"仮説推論\",\"description\":\"観察から最良の説明を推論する\",\"category\":\"ai-fundamentals\",\"contentType\":\"tip\",\"newsType\":\"$undefined\",\"difficulty\":\"advanced\",\"tags\":[\"上級テクニック\",\"高度プロンプティング\"],\"publishedAt\":\"2026-02-14\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"$undefined\",\"estimatedReadTime\":6,\"content\":\"$54\",\"coverImage\":null},{\"slug\":\"abstract-draft\",\"title\":\"学会抄録ドラフト\",\"description\":\"学会発表の抄録をドラフトさせる\",\"category\":\"clinical\",\"contentType\":\"tip\",\"newsType\":\"$undefined\",\"difficulty\":\"intermediate\",\"tags\":[\"実践テクニック\",\"臨床応用\"],\"publishedAt\":\"2026-02-14\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"$undefined\",\"estimatedReadTime\":5,\"content\":\"$55\",\"coverImage\":null},{\"slug\":\"adaptive-prompting\",\"title\":\"適応的プロンプティング\",\"description\":\"ユーザーの反応に応じてプロンプトを調整する\",\"category\":\"ai-fundamentals\",\"contentType\":\"tip\",\"newsType\":\"$undefined\",\"difficulty\":\"advanced\",\"tags\":[\"対話型\",\"インタラクティブ\"],\"publishedAt\":\"2026-02-14\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"$undefined\",\"estimatedReadTime\":7,\"content\":\"$56\",\"coverImage\":null},{\"slug\":\"analogical-reasoning\",\"title\":\"類推推論\",\"description\":\"類似の症例やパターンから類推する\",\"category\":\"ai-fundamentals\",\"contentType\":\"tip\",\"newsType\":\"$undefined\",\"difficulty\":\"advanced\",\"tags\":[\"上級テクニック\",\"高度プロンプティング\"],\"publishedAt\":\"2026-02-14\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"$undefined\",\"estimatedReadTime\":7,\"content\":\"$57\",\"coverImage\":null},{\"slug\":\"automatic-cot\",\"title\":\"自動Chain-of-Thought\",\"description\":\"推論チェーンを自動生成する\",\"category\":\"ai-fundamentals\",\"contentType\":\"tip\",\"newsType\":\"$undefined\",\"difficulty\":\"advanced\",\"tags\":[\"上級テクニック\",\"高度プロンプティング\"],\"publishedAt\":\"2026-02-14\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"$undefined\",\"estimatedReadTime\":6,\"content\":\"$58\",\"coverImage\":null},{\"slug\":\"before-after-comparison\",\"title\":\"「治療前後を比較して」\",\"description\":\"経過をわかりやすく整理するコツ\",\"category\":\"clinical\",\"contentType\":\"tip\",\"newsType\":\"$undefined\",\"difficulty\":\"beginner\",\"tags\":[\"実践テクニック\",\"臨床応用\"],\"publishedAt\":\"2026-02-14\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"$undefined\",\"estimatedReadTime\":4,\"content\":\"\\n# 「治療前後を比較して」\\n\\n## このテクニックとは\\n\\n治療効果を評価するとき、「前」と「後」のデータを並べて比較する表形式の出力を指定すると、経過が一目でわかる整理ができる。バイタル・検査値・症状・画像所見など複数の項目が時系列で変化する場合、散らばったデータをAIが構造化してくれる。\\n\\nこのテクニックはカンファレンスや総回診での症例発表に特に有効だ。「入院時」「治療開始7日後」「退院時」という3時点の比較を依頼すると、治療効果が視覚的に伝わる表が自動生成される。発表者が「何が改善し、何が残存しているか」を簡潔に説明できるようになる。\\n\\nさらに「改善点だけでなく、残存する問題点も記載してください」という指示を加えることで、治療の成功面だけでなく次のステップ（追加治療・フォローアップ方針）を示す資料としても機能する。\\n\\n## 基本パターン\\n\\n```text\\n以下のデータについて、[時点A]と[時点B]（および[時点C]）を比較した表を作成してください。\\n\\n【比較データ】\\n[時点A（例：入院時）]\\n[バイタル・検査値・症状などのデータ]\\n\\n[時点B（例：治療開始○日後/退院時）]\\n[バイタル・検査値・症状などのデータ]\\n\\n【出力形式】\\n- 項目ごとに時点を横軸にした比較表（マークダウン形式）\\n- 変化の方向（改善/悪化/不変）を矢印や記号で示す\\n- 表の後に「主な改善点」と「残存する問題点・今後の課題」をそれぞれ箇条書きでまとめる\\n```\\n\\n## 医療での活用例\\n\\n### シナリオ\\n\\n治療効果を整理したい。カンファで経過を発表する。\\n\\n### プロンプト例\\n\\n```text\\n以下のデータについて、[時点A]と[時点B]を比較し、表形式でまとめてください。改善点と残存する問題点も記載してください。\\n\\n[データ]\\n```\\n\\n## いつ使うべきか\\n\\n- カンファレンス・総回診で担当症例の治療経過を発表するとき\\n- 長期入院患者の治療効果を多職種チームと共有する資料を準備するとき\\n- 外来フォロー患者の経年変化（検査値・症状）をまとめて治療方針を見直すとき\\n- 薬剤変更・手術・リハビリなどの介入効果を可視化して患者・家族に説明するとき\\n- 症例報告・ケースレポートを執筆する際に、時系列の経過を整理した表を作成するとき\\n\",\"coverImage\":null},{\"slug\":\"bias-awareness\",\"title\":\"バイアス認識\",\"description\":\"潜在的なバイアスを認識し、対処する\",\"category\":\"ai-fundamentals\",\"contentType\":\"tip\",\"newsType\":\"$undefined\",\"difficulty\":\"advanced\",\"tags\":[\"品質向上\",\"プロンプト改善\"],\"publishedAt\":\"2026-02-14\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"$undefined\",\"estimatedReadTime\":7,\"content\":\"$59\",\"coverImage\":null},{\"slug\":\"causal-reasoning\",\"title\":\"因果推論\",\"description\":\"因果関係を明示的に分析する\",\"category\":\"ai-fundamentals\",\"contentType\":\"tip\",\"newsType\":\"$undefined\",\"difficulty\":\"advanced\",\"tags\":[\"上級テクニック\",\"高度プロンプティング\"],\"publishedAt\":\ :false,\"riskLevel\":\"$undefined\",\"estimatedReadTime\":4,\"content\":\"$6c\",\"coverImage\":null},{\"slug\":\"expert-roleplay\",\"title\":\"専門家ロールプレイ\",\"description\":\"「あなたは〇〇の第一人者です」で専門家の視点を引き出す\",\"category\":\"clinical\",\"contentType\":\"tip\",\"newsType\":\"$undefined\",\"difficulty\":\"beginner\",\"tags\":[\"実践テクニック\",\"臨床応用\"],\"publishedAt\":\"2026-02-14\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":true,\"riskLevel\":\"$undefined\",\"estimatedReadTime\":4,\"content\":\"$6d\",\"coverImage\":null},{\"slug\":\"explain-to-junior\",\"title\":\"「研修医に説明して」法\",\"description\":\"難解な内容を噛み砕いて説明させるコツ\",\"category\":\"clinical\",\"contentType\":\"tip\",\"newsType\":\"$undefined\",\"difficulty\":\"beginner\",\"tags\":[\"実践テクニック\",\"臨床応用\"],\"publishedAt\":\"2026-02-14\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"$undefined\",\"estimatedReadTime\":4,\"content\":\"$6e\",\"coverImage\":null},{\"slug\":\"fact-checking\",\"title\":\"事実確認\",\"description\":\"出力された情報の事実確認を促す\",\"category\":\"ai-fundamentals\",\"contentType\":\"tip\",\"newsType\":\"$undefined\",\"difficulty\":\"intermediate\",\"tags\":[\"品質向上\",\"プロンプト改善\"],\"publishedAt\":\"2026-02-14\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"$undefined\",\"estimatedReadTime\":6,\"content\":\"$6f\",\"coverImage\":null},{\"slug\":\"guideline-summary\",\"title\":\"ガイドライン要約\",\"description\":\"ガイドラインの要点を要約させる\",\"category\":\"clinical\",\"contentType\":\"tip\",\"newsType\":\"$undefined\",\"difficulty\":\"intermediate\",\"tags\":[\"実践テクニック\",\"臨床応用\"],\"publishedAt\":\"2026-02-14\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"$undefined\",\"estimatedReadTime\":4,\"content\":\"\\n# ガイドライン要約\\n\\n## このテクニックとは\\n\\n臨床ガイドラインは数百ページに及ぶことも多く、緊急の臨床場面で必要な情報を素早く引き出すのは難しい。AIに「診断基準・重症度分類・治療アルゴリズム・推奨グレード」という構造化された要約を依頼することで、素早くガイドラインの核心を把握できる。\\n\\n特に有効なのは、学会を横断した比較だ。「日本循環器学会・ACC/AHA・ESCのガイドラインでの推奨の違いを比較して」と指定すると、国際比較の視点で情報が整理される。海外の論文を読む際や、国際学会での発表を準備する際に役立つ。\\n\\nただし、AIのガイドライン知識にはカットオフ時期があり、最新の改訂が反映されていない可能性がある。「このガイドラインが改訂された可能性がある場合は記載してほしい」と付け加え、重要な臨床判断の前は必ず原典を確認する習慣が重要だ。\\n\\n## 基本パターン\\n\\n```text\\n[ガイドライン名]（発行年：[年]）について、以下の要点を構造化して要約してください。\\n\\n1. 診断基準（主要診断基準・副次診断基準・診断に必要な検査）\\n2. 重症度分類（分類の軸・各重症度の定義）\\n3. 治療アルゴリズム（重症度別・病期別の治療の流れ）\\n4. 推奨グレード（Class I/IIa/IIb/III、またはGrade A/B/Cなど）\\n5. 特に注意すべき点・よくある誤解\\n6. 前版からの主な改訂点（把握している場合）\\n\\nこのガイドラインが改訂された可能性がある場合は、その旨を記載してください。\\n```\\n\\n## 医療での活用例\\n\\n### シナリオ\\n\\nガイドラインの要点を素早く確認したい。\\n\\n### プロンプト例\\n\\n```text\\n[ガイドライン名]について、以下の要点を要約してください：\\n\\n- 診断基準\\n- 重症度分類\\n- 治療アルゴリズム\\n- 推奨グレード（あれば）\\n- 特に注意すべき点\\n```\\n\\n## いつ使うべきか\\n\\n- 専門外の疾患を担当し、関連ガイドラインの骨格を素早く把握したいとき\\n- カンファレンス・症例検討会の発表前にガイドライン準拠の治療方針を確認するとき\\n- 研修医・医学生へのティーチングでガイドラインの重要ポイントを解説するとき\\n- 日本と海外のガイドラインの推奨の違いを比較・把握したいとき\\n- ガイドラインが改訂されたことを聞き、前版との違いを効率よく確認したいとき\\n\",\"coverImage\":null},{\"slug\":\"hierarchical-reasoning\",\"title\":\"階層的推論\",\"description\":\"抽象度の異なるレベルで分析を行う\",\"category\":\"ai-fundamentals\",\"contentType\":\"tip\",\"newsType\":\"$undefined\",\"difficulty\":\"advanced\",\"tags\":[\"上級テクニック\",\"高度プロンプティング\"],\"publishedAt\":\"2026-02-14\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"$undefined\",\"estimatedReadTime\":8,\"content\":\"$70\",\"coverImage\":null},{\"slug\":\"interactive-task-management\",\"title\":\"対話型タスク管理\",\"description\":\"対話を通じてタスクを段階的に管理する\",\"category\":\"ai-fundamentals\",\"contentType\":\"tip\",\"newsType\":\"$undefined\",\"difficulty\":\"intermediate\",\"tags\":[\"対話型\",\"インタラクティブ\"],\"publishedAt\":\"2026-02-14\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"$undefined\",\"estimatedReadTime\":6,\"content\":\"$71\",\"coverImage\":null},{\"slug\":\"iterative-clarification\",\"title\":\"反復的明確化\",\"description\":\"対話を通じて情報を明確化する\",\"category\":\"ai-fundamentals\",\"contentType\":\"tip\",\"newsTy i\",\"title\":\"医療AIをはじめよう\",\"description\":\"医療従事者がAI（大規模言語モデル）を臨床に活用するための入門ガイド\",\"category\":\"ai-fundamentals\",\"contentType\":\"article\",\"newsType\":\"$undefined\",\"difficulty\":\"beginner\",\"tags\":[\"AI入門\",\"医療AI\",\"LLM\",\"はじめかた\",\"基礎知識\"],\"publishedAt\":\"2026-02-13\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":true,\"riskLevel\":\"$undefined\",\"estimatedReadTime\":9,\"content\":\"$c5\",\"coverImage\":null},{\"slug\":\"radiology-report-template\",\"title\":\"画像所見レポート作成支援\",\"description\":\"CT・MRI・X線の所見を構造化されたレポート形式で記述するための放射線科レポートテンプレート\",\"category\":\"clinical\",\"contentType\":\"prompt\",\"newsType\":\"$undefined\",\"difficulty\":\"intermediate\",\"tags\":[\"放射線科\",\"レポート\",\"CT\",\"MRI\",\"所見記載\",\"構造化レポート\"],\"publishedAt\":\"2026-02-12\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"medium\",\"estimatedReadTime\":2,\"content\":\"\\n# 画像所見レポート作成支援\\n\\n## 概要\\n\\n放射線科レポートは臨床医への重要な情報伝達手段です。構造化レポートは情報の漏れを防ぎ、臨床医が必要な情報に素早くアクセスできるようにします。\\n\\n## プロンプトテンプレート\\n\\n```text\\nあなたは経験豊富な放射線科専門医です。以下の画像検査について、構造化された読影レポートを作成してください。\\n\\n# 検査情報\\n- 検査種別: {{CT/MRI/X線/超音波}}\\n- 撮影部位: {{部位}}\\n- 造影: {{単純/造影（造影剤:___）}}\\n- 臨床情報: {{依頼医からの臨床情報}}\\n- 比較対象: {{前回検査日（あれば）}}\\n\\n# 画像所見（箇条書きで入力）\\n{{観察した所見をそのまま入力}}\\n\\n# 出力形式\\n## 検査概要\\n検査名、撮影条件の要約\\n\\n## 所見（Findings）\\n臓器別に構造化して記述：\\n- 対象臓器/関心領域の所見\\n- サイズの定量記載（mm単位）\\n- 前回比較がある場合は変化を記載\\n- 偶発所見（incidental findings）\\n\\n## 診断（Impression）\\n1. 主要診断（臨床的疑問への回答）\\n2. 鑑別診断（ある場合）\\n3. 偶発所見への推奨対応\\n4. フォローアップの推奨（時期と検査方法）\\n\\n## 推奨\\n追加検査や臨床的アクションの推奨\\n\\n注意：AIが生成するレポートは下書きです。最終レポートは放射線科医が確認してください。\\n```\\n\",\"coverImage\":null},{\"slug\":\"ai-nursing-support\",\"title\":\"看護業務とAI：記録・アセスメント・申し送りの効率化\",\"description\":\"看護師の業務負担軽減にAIがどう貢献するか。電子カルテの記録支援から臨床アセスメント支援まで\",\"category\":\"workflow\",\"contentType\":\"article\",\"newsType\":\"$undefined\",\"difficulty\":\"beginner\",\"tags\":[\"看護\",\"業務効率化\",\"アセスメント\",\"申し送り\",\"記録\",\"チーム医療\"],\"publishedAt\":\"2026-02-12\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"$undefined\",\"estimatedReadTime\":6,\"content\":\"$c6\",\"coverImage\":null},{\"slug\":\"discharge-planning-checklist\",\"title\":\"退院計画チェックリスト\",\"description\":\"安全な退院に必要な項目を網羅的に確認し、退院指導の内容を患者・家族向けに生成するプロンプト\",\"category\":\"clinical\",\"contentType\":\"prompt\",\"newsType\":\"$undefined\",\"difficulty\":\"beginner\",\"tags\":[\"退院計画\",\"退院指導\",\"多職種連携\",\"在宅医療\",\"服薬指導\"],\"publishedAt\":\"2026-02-10\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"low\",\"estimatedReadTime\":3,\"content\":\"\\n# 退院計画チェックリスト\\n\\n## 概要\\n\\n退院計画の不備は再入院の主要原因です。このプロンプトは退院に必要な確認事項を網羅し、患者・家族向けの説明資料の下書きを生成します。\\n\\n## プロンプトテンプレート\\n\\n```text\\nあなたは退院調整に詳しい総合内科医です。以下の患者の退院計画を立ててください。\\n\\n# 患者情報\\n- 年齢: {{年齢}}歳、性別: {{性別}}\\n- 入院日: {{入院日}}、退院予定日: {{退院予定日}}\\n- 主病名: {{診断名}}\\n- 入院中の治療内容: {{治療の要約}}\\n- ADL: {{自立/一部介助/全介助}}\\n- 認知機能: {{正常/軽度低下/認知症}}\\n- 同居家族: {{家族構成}}\\n- 介護保険: {{未申請/申請中/要支援___/要介護___}}\\n\\n# 退院時の処方\\n{{退院時の処方内容}}\\n\\n# 出力形式\\n\\n## 1. 退院前確認チェックリスト\\n- [ ] バイタルサイン安定（48時間以上）\\n- [ ] 経口摂取良好\\n- [ ] 退院時処方の説明完了\\n- [ ] 外来予約の確認\\n- [ ] 在宅サービスの調整（必要時）\\n- [ ] 患者・家族への退院指導完了\\n- その他、この患者に特有の確認事項\\n\\n## 2. 患者・家族向け退院指導書\\n- 退院後の生活上の注意点（平易な言葉で）\\n- 服薬スケジュール（表形式）\\n- 再受診のタイミング\\n- 緊急時の連絡先と受診基準（Red Flags）\\n- 食事・運動の注意点\\n\\n## 3. かかりつけ医への診療情報提供書（要約）\\n- 入院経過の要約\\n- 退院時処方と変更理由\\n- フォローアップの依頼事項\\n```\\n\",\"coverImage\":null},{\"slug\":\"ai-emergency-triage\",\"title\":\"救急医療とAI：トリアージから診断支援まで\",\"description\":\"救急外来の混雑と待ち時間を改善するAIトリアージ、画像診断支援、臨床意思決定支援の最前線\",\"category\":\"diagnosis\",\"contentType\":\"article\",\"newsType\":\"$undefined\",\"difficulty\":\"intermediate\",\"tags\":[\"救急医療\",\"トリアージ\",\"JTAS\",\"CT\",\"意思決定支援\",\"時間外\"],\"publishedAt\":\"2026-02-10\",\"updatedAt\":\"$undefined\",\"author\":\"kenokamoto\",\"featured\":false,\"riskLevel\":\"$undefined\",\"estimatedReadTime\":6,\"content\":\"$c7\",\"coverImage\":null},
